version: '3.8'

services:
  api:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kronos_net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: kronos123
      POSTGRES_DB: kronos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kronos_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos -d kronos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - kronos_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - kronos_net

  beat:
    build: .
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - kronos_net

  telemetry_worker:
    build: .
    command: python -m app.workers.telemetry_worker
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - kronos_net

volumes:
  postgres_data:

networks:
  kronos_net:
